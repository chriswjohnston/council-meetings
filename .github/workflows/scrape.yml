name: Scrape Council Meetings

on:
  schedule:
    - cron: '0 13 * * 1'   # Every Monday 9AM Eastern
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Check run week (odd weeks only)
        id: week_check
        run: |
          WEEK=$(date +%V | sed 's/^0*//')
          if (( WEEK % 2 == 1 )); then
            echo "run=true"  >> $GITHUB_OUTPUT
            echo "Week $WEEK — running"
          else
            echo "run=false" >> $GITHUB_OUTPUT
            echo "Week $WEEK — skipping (even week)"
          fi

      - uses: actions/setup-python@v5.4.0
        if: steps.week_check.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.week_check.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        run: pip install requests beautifulsoup4 pdfminer.six

      - name: Run scraper
        if: steps.week_check.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRANCH: public
        run: python scraper.py

      - name: Commit changes
        if: steps.week_check.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ state.json summaries.json html_page_cache.json || true
          git diff --staged --quiet && echo "No changes" || (git commit -m "Auto: council archive $(date +'%Y-%m-%d')" && git push)
